services:
  proxy:
    image: traefik:v3.1
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    mem_limit: 160m
    cpus: 0.20

  portfolio-api:
    build:
      context: ./services/portfolio-api
    expose:
      - "8000"
    labels:
      - traefik.enable=true
      - traefik.http.routers.portfolio-api.rule=Host(`${PORTFOLIO_API_HOST}`)
      - traefik.http.services.portfolio-api.loadbalancer.server.port=8000
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.40

  portfolio-web:
    image: nginx:1.27-alpine
    volumes:
      - ./services/portfolio-web:/usr/share/nginx/html:ro
    expose:
      - "80"
    labels:
      - traefik.enable=true
      - traefik.http.routers.portfolio-web.rule=Host(`${PORTFOLIO_WEB_HOST}`)
      - traefik.http.services.portfolio-web.loadbalancer.server.port=80
    restart: unless-stopped
    mem_limit: 150m
    cpus: 0.20

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio
      POSTGRES_DB: portfolio
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    mem_limit: 400m
    cpus: 0.20

volumes:
  postgres_data:
