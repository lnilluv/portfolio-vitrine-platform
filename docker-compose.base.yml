services:
  proxy:
    image: traefik:v3.3
    environment:
      DOCKER_API_VERSION: "1.44"
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
    labels:
      - traefik.enable=true
      - traefik.http.routers.www-redirect.rule=Host(`${WWW_HOST}`)
      - traefik.http.routers.www-redirect.entrypoints=websecure
      - traefik.http.routers.www-redirect.tls=true
      - traefik.http.routers.www-redirect.tls.certresolver=letsencrypt
      - traefik.http.routers.www-redirect.service=noop@internal
      - traefik.http.routers.www-redirect.middlewares=www-to-apex
      - traefik.http.middlewares.www-to-apex.redirectregex.regex=^https://www\\.(.+)
      - traefik.http.middlewares.www-to-apex.redirectregex.replacement=https://$${1}
      - traefik.http.middlewares.www-to-apex.redirectregex.permanent=true
    restart: unless-stopped
    mem_limit: 160m
    cpus: 0.20

  portfolio-api:
    build:
      context: .
      dockerfile: services/portfolio-api/Dockerfile
    expose:
      - "8000"
    labels:
      - traefik.enable=true
      - traefik.http.routers.portfolio-api.rule=Host(`${PORTFOLIO_API_HOST}`)
      - traefik.http.routers.portfolio-api.entrypoints=websecure
      - traefik.http.routers.portfolio-api.tls=true
      - traefik.http.routers.portfolio-api.tls.certresolver=letsencrypt
      - traefik.http.services.portfolio-api.loadbalancer.server.port=8000
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.40

  portfolio-web:
    build:
      context: .
      dockerfile: services/portfolio-web/Dockerfile
    environment:
      PORTFOLIO_API_BASE: ${PORTFOLIO_API_BASE}
      PORT: 4173
    expose:
      - "4173"
    labels:
      - traefik.enable=true
      - traefik.http.routers.portfolio-web.rule=Host(`${PORTFOLIO_WEB_HOST}`)
      - traefik.http.routers.portfolio-web.entrypoints=websecure
      - traefik.http.routers.portfolio-web.tls=true
      - traefik.http.routers.portfolio-web.tls.certresolver=letsencrypt
      - traefik.http.services.portfolio-web.loadbalancer.server.port=4173
    restart: unless-stopped
    mem_limit: 280m
    cpus: 0.40

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio
      POSTGRES_DB: portfolio
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    mem_limit: 400m
    cpus: 0.20

volumes:
  postgres_data:
