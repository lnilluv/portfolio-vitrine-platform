name: Deploy Production

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Join tailnet
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          version: latest

      - name: Sync stack files to VPS
        run: |
          tailscale ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "mkdir -p /opt/portfolio/compose /opt/portfolio/env /opt/portfolio/logs /opt/portfolio/data"
          tar \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.worktrees/' \
            -czf - . | tailscale ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "tar -xzf - -C /opt/portfolio/compose"

      - name: Upload runtime environment file
        run: |
          printf '%s\n' "${{ secrets.PORTFOLIO_ENV_FILE }}" | tailscale ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "cat > /opt/portfolio/env/.env && chmod 600 /opt/portfolio/env/.env"

      - name: Pull and restart stack
        run: |
          tailscale ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
            set -euo pipefail
            cd /opt/portfolio/compose
            docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" -p "${{ secrets.GHCR_TOKEN }}"
            docker compose --env-file /opt/portfolio/env/.env -f docker-compose.base.yml -f docker-compose.demos.yml -f docker-compose.projects.yml pull
            docker compose --env-file /opt/portfolio/env/.env -f docker-compose.base.yml -f docker-compose.demos.yml -f docker-compose.projects.yml up -d --force-recreate proxy
            docker compose --env-file /opt/portfolio/env/.env -f docker-compose.base.yml -f docker-compose.demos.yml -f docker-compose.projects.yml up -d --build --remove-orphans
            docker compose --env-file /opt/portfolio/env/.env -f docker-compose.base.yml -f docker-compose.demos.yml -f docker-compose.projects.yml ps
          '

      - name: Smoke checks
        run: |
          tailscale ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
            set -euo pipefail
            docker compose --env-file /opt/portfolio/env/.env -f /opt/portfolio/compose/docker-compose.base.yml -f /opt/portfolio/compose/docker-compose.demos.yml -f /opt/portfolio/compose/docker-compose.projects.yml ps
            for container in compose-proxy-1 compose-portfolio-web-1 compose-portfolio-api-1 compose-nlp-spam-api-1; do
              [ "$(docker inspect -f "{{.State.Status}}" "$container")" = "running" ]
            done
            curl -sk --resolve nilluv.com:443:127.0.0.1 https://nilluv.com > /dev/null
            curl -sk --resolve api.nilluv.com:443:127.0.0.1 https://api.nilluv.com/healthz > /dev/null
            docker exec compose-portfolio-api-1 python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/healthz\", timeout=10)"
            docker exec compose-nlp-spam-api-1 python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/healthz\", timeout=10)"
          '
