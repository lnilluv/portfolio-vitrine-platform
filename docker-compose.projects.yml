      - traefik.http.routers.uber-hotzone.tls=true
      - traefik.http.routers.uber-hotzone.tls.certresolver=letsencrypt
      - traefik.http.services.uber-hotzone.loadbalancer.server.port=8080
    restart: unless-stopped
